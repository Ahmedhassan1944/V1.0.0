<style>
  /*
   * =========================================================
   * ENTERPRISE HR MOBILIZATION — DESIGN SYSTEM
   * Inspired by: Microsoft Fluent UI / Azure Portal
   * =========================================================
   */

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    /* Brand */
    --primary:        #0f6abe;
    --primary-dark:   #005a9e;
    --primary-light:  #deecf9;
    --accent:         #0078d4;

    /* Semantic */
    --success:        #107c10;
    --success-bg:     #dff6dd;
    --warning:        #d83b01;
    --warning-bg:     #fff4ce;
    --danger:         #a4262c;
    --danger-bg:      #fde7e9;
    --info:           #0078d4;
    --info-bg:        #eff6fc;

    /* Neutrals */
    --bg-body:        #f3f2f1;
    --bg-surface:     #ffffff;
    --bg-sidebar:     #1b1a19;
    --bg-hover:       #f3f2f1;
    --text-primary:   #201f1e;
    --text-secondary: #605e5c;
    --text-muted:     #a19f9d;
    --text-inverse:   #ffffff;
    --border:         #edebe9;
    --border-focus:   #0078d4;

    /* Spacing */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 16px;
    --sp-4: 24px; --sp-5: 32px; --sp-6: 48px;

    /* Shape */
    --radius-sm:  4px;
    --radius:     8px;
    --radius-lg:  12px;
    --radius-xl:  16px;

    /* Elevation */
    --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
    --shadow:     0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg:  0 10px 30px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.05);

    /* Sidebar */
    --sidebar-w:  240px;
    --header-h:   56px;

    /* Transitions */
    --ease: .2s ease;
  }

  /* ── Reset ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  img, svg { display: block; max-width: 100%; }

  button { font-family: inherit; }

  /* ── Layout Shell ────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    min-height: 100vh;
  }

  /* ── Top Header ──────────────────────────────── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--sp-4);
    background: var(--bg-sidebar);
    border-bottom: 1px solid rgba(255,255,255,.08);
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--header-h);
  }

  .topbar__brand {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    color: var(--text-inverse);
    font-size: .875rem;
    font-weight: 700;
    letter-spacing: .02em;
  }

  .topbar__brand-icon {
    width: 28px; height: 28px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    font-size: .75rem; font-weight: 700;
    color: #fff; flex-shrink: 0;
  }

  .topbar__right {
    display: flex; align-items: center; gap: var(--sp-3);
  }

  .topbar__user {
    display: flex; align-items: center; gap: var(--sp-2);
    cursor: pointer; padding: var(--sp-1) var(--sp-2);
    border-radius: var(--radius-sm);
    transition: background var(--ease);
  }

  .topbar__user:hover { background: rgba(255,255,255,.08); }

  .topbar__avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--primary);
    display: grid; place-items: center;
    font-size: .75rem; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  .topbar__username {
    color: rgba(255,255,255,.85);
    font-size: .8rem; font-weight: 500;
  }

  .topbar__role-badge {
    font-size: .65rem; font-weight: 700;
    background: rgba(15,106,190,.35);
    color: #90c8e0;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .notification-btn {
    position: relative;
    background: transparent; border: none; cursor: pointer;
    padding: var(--sp-1); border-radius: var(--radius-sm);
    color: rgba(255,255,255,.7);
    font-size: 1.1rem;
    transition: background var(--ease), color var(--ease);
  }

  .notification-btn:hover { background: rgba(255,255,255,.08); color: #fff; }

  .notification-btn__dot {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger); border: 2px solid var(--bg-sidebar);
  }

  /* ── Sidebar ─────────────────────────────────── */
  .sidebar {
    background: var(--bg-sidebar);
    padding: var(--sp-3) 0;
    border-right: 1px solid rgba(255,255,255,.05);
    overflow-y: auto;
    display: flex; flex-direction: column;
    position: sticky; top: var(--header-h);
    height: calc(100vh - var(--header-h));
  }

  .sidebar__section-label {
    padding: var(--sp-3) var(--sp-3) var(--sp-1);
    font-size: .65rem; font-weight: 700;
    color: rgba(255,255,255,.3);
    letter-spacing: .1em; text-transform: uppercase;
  }

  .nav__item {
    display: flex; align-items: center; gap: var(--sp-2);
    padding: 10px var(--sp-3);
    color: rgba(255,255,255,.65);
    font-size: .85rem; font-weight: 500;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background var(--ease), color var(--ease), border-color var(--ease);
    position: relative;
  }

  .nav__item:hover {
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.9);
  }

  .nav__item.active {
    background: rgba(15,106,190,.2);
    color: #fff;
    border-left-color: var(--primary);
    font-weight: 600;
  }

  .nav__item-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

  .nav__badge {
    margin-left: auto;
    background: var(--danger);
    color: #fff;
    font-size: .65rem; font-weight: 700;
    padding: 1px 6px; border-radius: 20px;
    min-width: 18px; text-align: center;
  }

  .sidebar__footer {
    margin-top: auto;
    padding: var(--sp-3);
    border-top: 1px solid rgba(255,255,255,.06);
    font-size: .75rem;
    color: rgba(255,255,255,.3);
    text-align: center;
  }

  /* ── Main Content ────────────────────────────── */
  .content {
    padding: var(--sp-4) var(--sp-5);
    overflow-y: auto;
    background: var(--bg-body);
  }

  /* ── Page Header ─────────────────────────────── */
  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: var(--sp-3);
    margin-bottom: var(--sp-4);
    padding-bottom: var(--sp-4);
    border-bottom: 1px solid var(--border);
  }

  .page-header__title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
  .page-header__sub   { font-size: .875rem; color: var(--text-secondary); margin-top: 2px; }

  .page-header__actions { display: flex; gap: var(--sp-2); align-items: center; }

  /* ── KPI Cards ───────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--sp-3);
    margin-bottom: var(--sp-4);
  }

  .kpi-card {
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    padding: var(--sp-4);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; gap: var(--sp-2);
    position: relative; overflow: hidden;
    transition: transform var(--ease), box-shadow var(--ease);
  }

  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--kpi-color, var(--primary));
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .kpi-card--blue   { --kpi-color: #0078d4; }
  .kpi-card--orange { --kpi-color: #d83b01; }
  .kpi-card--red    { --kpi-color: #a4262c; }
  .kpi-card--green  { --kpi-color: #107c10; }
  .kpi-card--purple { --kpi-color: #5c2d91; }

  .kpi-card__label  { font-size: .8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
  .kpi-card__value  { font-size: 2.25rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .kpi-card__footer { font-size: .75rem; color: var(--text-muted); }
  .kpi-card__icon   { position: absolute; right: var(--sp-3); top: 50%; transform: translateY(-50%); font-size: 2rem; }

  /* ── Buttons ─────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: var(--sp-1);
    padding: 8px var(--sp-3);
    border-radius: var(--radius-sm); border: none;
    font-size: .85rem; font-weight: 600;
    cursor: pointer;
    transition: background var(--ease), opacity var(--ease), transform var(--ease);
    white-space: nowrap;
  }

  .btn:hover  { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .btn--primary   { background: var(--primary); color: #fff; }
  .btn--primary:hover { background: var(--primary-dark); }
  .btn--danger    { background: var(--danger);  color: #fff; }
  .btn--success   { background: var(--success); color: #fff; }
  .btn--outline   { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
  .btn--outline:hover { background: var(--bg-hover); }
  .btn--ghost     { background: transparent; color: var(--text-secondary); }
  .btn--ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
  .btn--sm        { padding: 5px var(--sp-2); font-size: .78rem; }
  .btn--icon      { padding: 6px; border-radius: var(--radius-sm); }

  /* ── Data Table ──────────────────────────────── */
  .table-card {
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: var(--sp-4);
  }

  .table-toolbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: var(--sp-3); padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--border);
  }

  .table-toolbar__title { font-size: 1rem; font-weight: 700; }

  .table-toolbar__actions { display: flex; gap: var(--sp-2); align-items: center; }

  .search-input {
    display: flex; align-items: center;
    background: var(--bg-body); border: 1px solid var(--border);
    border-radius: var(--radius-sm); overflow: hidden;
  }

  .search-input__icon { padding: 0 var(--sp-2); color: var(--text-muted); font-size: .9rem; }

  .search-input input {
    border: none; background: transparent;
    padding: 7px var(--sp-2) 7px 0;
    font-size: .85rem; width: 200px;
    color: var(--text-primary); outline: none;
    font-family: inherit;
  }

  .search-input input::placeholder { color: var(--text-muted); }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; }

  thead th {
    padding: var(--sp-2) var(--sp-3);
    background: var(--bg-body);
    text-align: left; font-size: .75rem; font-weight: 700;
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background var(--ease);
  }

  tbody tr:hover { background: #faf9f8; }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: var(--sp-2) var(--sp-3);
    color: var(--text-primary);
    vertical-align: middle;
  }

  .td-primary { font-weight: 600; }
  .td-secondary { color: var(--text-secondary); font-size: .8rem; }

  tbody tr.tr--selected { background: var(--primary-light); }

  .table-empty {
    text-align: center; padding: var(--sp-6);
    color: var(--text-muted); font-size: .9rem;
  }

  .table-empty__icon { font-size: 2.5rem; margin-bottom: var(--sp-2); }

  .table-footer {
    padding: var(--sp-2) var(--sp-4);
    border-top: 1px solid var(--border);
    font-size: .8rem; color: var(--text-secondary);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* ── Status Badges ───────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: .72rem; font-weight: 700; white-space: nowrap;
    text-transform: uppercase; letter-spacing: .03em;
  }

  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .badge--pending   { background: var(--warning-bg); color: var(--warning); }
  .badge--review    { background: var(--info-bg);    color: var(--info); }
  .badge--approved  { background: var(--success-bg); color: var(--success); }
  .badge--rejected  { background: var(--danger-bg);  color: var(--danger); }
  .badge--mobilized { background: #ebe5f4; color: #5c2d91; }
  .badge--closed    { background: var(--bg-body);    color: var(--text-muted); }

  /* ── Forms ───────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--sp-3);
  }

  @media (min-width: 640px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid .col-span-2 { grid-column: span 2; }
  }

  .form-group { display: flex; flex-direction: column; gap: var(--sp-1); }

  .form-label {
    font-size: .82rem; font-weight: 600;
    color: var(--text-secondary);
  }

  .form-label .required { color: var(--danger); }

  .form-input, .form-select, .form-textarea {
    padding: 8px var(--sp-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: .875rem; font-family: inherit;
    color: var(--text-primary);
    background: var(--bg-surface);
    transition: border-color var(--ease), box-shadow var(--ease);
    width: 100%;
    outline: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0,120,212,.12);
  }

  .form-error { font-size: .78rem; color: var(--danger); }

  /* ── Modal ───────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: var(--sp-4);
    opacity: 0; pointer-events: none;
    transition: opacity var(--ease);
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg-surface);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 640px;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(20px);
    transition: transform var(--ease);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal__header {
    padding: var(--sp-4);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg-surface); z-index: 1;
  }

  .modal__title { font-size: 1.1rem; font-weight: 700; }

  .modal__close {
    border: none; background: transparent; cursor: pointer;
    color: var(--text-muted); font-size: 1.2rem;
    padding: 4px; border-radius: var(--radius-sm);
    transition: background var(--ease), color var(--ease);
  }

  .modal__close:hover { background: var(--bg-hover); color: var(--text-primary); }

  .modal__body { padding: var(--sp-4); }
  .modal__footer {
    padding: var(--sp-3) var(--sp-4);
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: var(--sp-2);
    position: sticky; bottom: 0; background: var(--bg-surface);
  }

  /* ── Upload Zone ─────────────────────────────── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: var(--sp-4);
    text-align: center;
    background: var(--bg-body);
    cursor: pointer;
    transition: border-color var(--ease), background var(--ease);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: var(--primary-light);
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  .upload-zone__icon  { font-size: 2rem; margin-bottom: var(--sp-2); }
  .upload-zone__label { font-weight: 600; color: var(--text-primary); }
  .upload-zone__hint  { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }

  /* ── Progress Steps ──────────────────────────── */
  .steps {
    display: flex; align-items: center; gap: 0;
    margin-bottom: var(--sp-4); overflow-x: auto;
  }

  .step {
    display: flex; flex-direction: column; align-items: center;
    gap: var(--sp-1); min-width: 90px; text-align: center;
    position: relative; flex: 1;
  }

  .step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 14px; left: 50%; width: 100%;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }

  .step.done:not(:last-child)::after,
  .step.active:not(:last-child)::after { background: var(--primary); }

  .step__circle {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--border); color: var(--text-secondary);
    display: grid; place-items: center;
    font-size: .78rem; font-weight: 700;
    position: relative; z-index: 1;
    transition: background var(--ease), color var(--ease);
  }

  .step.active .step__circle { background: var(--primary); color: #fff; }
  .step.done   .step__circle { background: var(--success); color: #fff; }

  .step__label {
    font-size: .72rem; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .03em;
  }

  .step.active .step__label { color: var(--primary); }
  .step.done   .step__label { color: var(--success); }

  /* ── Document Row ────────────────────────────── */
  .doc-row {
    display: flex; align-items: center; gap: var(--sp-3);
    padding: var(--sp-3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-surface);
    margin-bottom: var(--sp-2);
    transition: box-shadow var(--ease);
  }

  .doc-row:hover { box-shadow: var(--shadow-sm); }

  .doc-row__icon {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: var(--info-bg); color: var(--info);
    display: grid; place-items: center; font-size: 1.1rem; flex-shrink: 0;
  }

  .doc-row__info { flex: 1; min-width: 0; }
  .doc-row__name { font-weight: 600; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-row__meta { font-size: .75rem; color: var(--text-muted); }
  .doc-row__actions { display: flex; gap: var(--sp-1); flex-shrink: 0; }

  /* ── Audit Log ───────────────────────────────── */
  .timeline { position: relative; padding-left: var(--sp-4); }

  .timeline::before {
    content: ''; position: absolute;
    left: 7px; top: 0; bottom: 0; width: 2px;
    background: var(--border);
  }

  .timeline__item {
    position: relative; padding: 0 0 var(--sp-3) var(--sp-3);
  }

  .timeline__item::before {
    content: ''; position: absolute;
    left: -9px; top: 5px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary);
    border: 2px solid var(--bg-surface);
  }

  .timeline__time { font-size: .72rem; color: var(--text-muted); }
  .timeline__event { font-size: .85rem; font-weight: 500; }
  .timeline__actor { font-size: .75rem; color: var(--text-secondary); }

  /* ── Toast Notification ──────────────────────── */
  .toast-container {
    position: fixed; bottom: var(--sp-4); right: var(--sp-4);
    z-index: 2000; display: flex; flex-direction: column; gap: var(--sp-2);
  }

  .toast {
    display: flex; align-items: center; gap: var(--sp-2);
    padding: var(--sp-2) var(--sp-3);
    background: var(--text-primary); color: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    font-size: .85rem; font-weight: 500;
    min-width: 260px; max-width: 380px;
    animation: slideInUp .25s ease;
  }

  .toast--success { background: var(--success); }
  .toast--error   { background: var(--danger); }
  .toast--warning { background: var(--warning); }

  @keyframes slideInUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ── Loading Spinner ─────────────────────────── */
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    animation: spin .6s linear infinite;
    display: inline-block; vertical-align: middle;
  }

  .spinner--dark {
